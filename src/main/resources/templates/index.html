<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Digital Wallet Transaction Log</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; }
        
        h1 { color: #1a1a2e; font-size: 28px; margin-bottom: 30px; text-align: center; }
        h2 { color: #16213e; font-size: 20px; margin-bottom: 20px; }

        .error {
            background: #ffe0e0; color: #c0392b; padding: 12px 20px;
            border-left: 5px solid #c0392b; border-radius: 4px; margin-bottom: 20px;
        }

        .card {
            background: white; border-radius: 12px;
            padding: 30px; margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #555; }
        .form-group input, .form-group select {
            padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus, .form-group select:focus { border-color: #4f46e5; }

        .btn {
            margin-top: 20px; padding: 12px 30px;
            background: #4f46e5; color: white; border: none;
            border-radius: 8px; font-size: 15px; cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #4338ca; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead tr { background: #4f46e5; color: white; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
        tbody tr:hover { background: #f8f7ff; }
        tbody tr:nth-child(even) { background: #fafafa; }

        .badge {
            padding: 4px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }
        .credit { background: #d1fae5; color: #065f46; }
        .debit { background: #fee2e2; color: #991b1b; }

        .empty { text-align: center; color: #aaa; padding: 30px; }
    </style>
</head>
<body>

    <h1>💳 Digital Wallet Transaction Log</h1>

    <div class="card">
        <h2>New Transaction</h2>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form action="/save" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" name="userName" placeholder="Enter user name" required/>
                </div>
                <div class="form-group">
                    <label>Wallet ID</label>
                    <input type="text" name="walletId" placeholder="Enter wallet ID" required/>
                </div>
                <div class="form-group">
                    <label>Transaction Type</label>
                    <select name="transactionType">
                        <option value="Credit">Credit</option>
                        <option value="Debit">Debit</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" name="amount" placeholder="Enter amount" step="0.01" required/>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description" placeholder="Enter description" required/>
                </div>
            </div>
            <button type="submit" class="btn">Submit Transaction</button>
        </form>
    </div>

    <div class="card">
        <h2>Transaction Log</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User Name</th>
                    <th>Wallet ID</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Transaction Time</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(transactions)}">
                    <td colspan="7" class="empty">No transactions yet. Add one above!</td>
                </tr>
                <tr th:each="t : ${transactions}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.userName}"></td>
                    <td th:text="${t.walletId}"></td>
                    <td>
                        <span class="badge"
                            th:classappend="${t.transactionType == 'Credit'} ? 'credit' : 'debit'"
                            th:text="${t.transactionType}">
                        </span>
                    </td>
                    <td th:text="${t.amount}"></td>
                    <td th:text="${t.description}"></td>
                    <td th:text="${t.transactionTime}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
